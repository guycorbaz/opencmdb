# The corpus lock (D56): a lockfile for data.
#
# Two directions, and the corpus is frozen only when both hold — `cargo xtask ci` checks both:
#   * EDITED — a listed artefact whose bytes changed is RED. The single repair is a deliberate
#     bump, which reads in review as "I am changing the spec".
#   * ADDED  — a file present under fixtures/ but absent here is RED. Without this the guarantee
#     would only be "listed files are unchanged", which is a different and much weaker claim.
#
# `generator` is absent for a hand-authored artefact — which is every artefact today. The seeded
# generator arrives after the engine (ARCH-24); until then, recording one would be a lie.
#
# Exempt from the orphan rule, deliberately and narrowly: this file (a lock cannot list itself)
# and README.md files (prose about the corpus, not artefacts of it).

